name: Auto Invoice CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Run ESLint
      run: npm run lint

    - name: Run Type Check
      run: npm run typecheck

    - name: Build Frontend
      run: npm run build

    - name: Verify Server File
      run: node -e "require('./server.js')"
      
    - name: Build Docker Image
      run: docker build -t auto-invoice .
